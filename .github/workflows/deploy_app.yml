# This is a basic workflow to help you get started with Actions

name: App Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  Deploy_WebApp:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Create image with dockerhub credientials
      - name: Build Image
        run: |
          docker build -t  ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}} .
          docker image tag ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}} ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:latest

      # Push image with unique tag and another image with latest tag
      - name: Push image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:latest
          
      # Copy webapp into ec2 
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}

      # Pull created image from docker hub and run container hosted on port 8080
      - name: Run container with image
        run: | 
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}}

            docker stop mywebapp || true
            docker rm mywebapp || true

            docker run -d --name mywebapp -p 8080:80 ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}}

          
        
        
        

