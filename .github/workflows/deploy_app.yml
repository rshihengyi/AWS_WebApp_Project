# This is a basic workflow to help you get started with Actions

name: App Deploy

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  workflow_dispatch:
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  Deploy_WebApp:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    outputs:
      instance_id: ${{ steps.tf_output.outputs.instance_id }}
      
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Create image with dockerhub credientials
      - name: Build Image
        run: |
          docker build -t  ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}} .
          docker image tag ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}} ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:latest

      # Push image with unique tag and another image with latest tag
      - name: Push image to DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::536984667329:role/Access_TF_resources_arch1
          aws-region: us-east-1

      # Using output from resource block
      - name: Get Instance ID
        id: tf_output
        run: echo "instance_id=$(terraform output -raw ec2_instance_id)" >> $GITHUB_OUTPUT

      # Pull created image from docker hub and run container hosted on port 8080
      - name: Run container with image
        run: | 
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}}

            docker stop mywebapp || true
            docker rm mywebapp || true

            docker run -d --name mywebapp -p 8080:80 ${{ secrets.DOCKERHUB_USERNAME }}/mywebapp:${{github.sha}}

          
        
        
        

